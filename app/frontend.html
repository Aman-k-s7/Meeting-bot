<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Bot - Manual Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-color), #1e1b4b);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 24px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            padding: 12px;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .file-input-wrapper {
            background: rgba(15, 23, 42, 0.6);
            border: 1px dashed var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .file-input-wrapper:hover {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
        }
        input[type="file"] {
            display: none;
        }
        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
        }
        .submit-btn:hover {
            background: var(--primary-hover);
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
        .submit-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 14px;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: var(--border);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        
        #result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }
        .success { background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; color: #34d399; }
        .error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #f87171; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Upload Transcript</h1>
        <p class="subtitle">Manually process a meeting transcript to extract action items.</p>

        <form id="uploadForm">
            <div class="form-group">
                <label for="user_name">Select User</label>
                <select id="user_name" name="user_name" required>
                    <option value="" disabled selected>Select the user...</option>
                    <option value="Isha">Isha</option>
                    <option value="Anmol">Anmol</option>
                    <option value="Sparsh">Sparsh</option>
                </select>
            </div>

            <div class="form-group">
                <label for="transcript">Paste Transcript Text</label>
                <textarea id="transcript" name="transcript" placeholder="Paste the full meeting transcript here..."></textarea>
            </div>

            <div class="divider">OR</div>

            <div class="form-group">
                <label>Upload Text File (.txt, .vtt)</label>
                <div class="file-input-wrapper" onclick="document.getElementById('file').click()">
                    <span id="fileName">Click to select a file</span>
                    <input type="file" id="file" name="file" accept=".txt,.vtt" onchange="document.getElementById('fileName').innerText = this.files[0]?.name || 'Click to select a file'">
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Process Meeting</button>
        </form>

        <div id="result"></div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const submitBtn = document.getElementById('submitBtn');
            const resultDiv = document.getElementById('result');
            
            submitBtn.disabled = true;
            submitBtn.innerText = 'Processing (this may take a minute)...';
            resultDiv.style.display = 'none';
            resultDiv.className = '';

            const formData = new FormData(form);

            try {
                const response = await fetch('/manual-upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `<strong>Success!</strong><br>Project Code: ${data.project_code}<br>Items Processed: ${data.items_processed}`;
                    form.reset();
                    document.getElementById('fileName').innerText = 'Click to select a file';
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `<strong>Error:</strong> ${data.detail || 'Something went wrong.'}`;
                }
            } catch (err) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `<strong>Error:</strong> Failed to connect to the server.`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Process Meeting';
                resultDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
